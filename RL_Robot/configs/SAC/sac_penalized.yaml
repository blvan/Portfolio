experiment_name: sac_penalized
seed: 42

env:
  reward: penalized
  max_episode_steps: 50
  n_envs: 1
  vec_env: dummy
  metrics:
    grasp_lift_threshold: 0.03
    grasp_distance_threshold: 0.07
  shaped_reward:
    goal_distance_weight: 1.0
    gripper_distance_weight: 0.25
    lift_weight: 1.0
    success_bonus: 2.0
    action_penalty_weight: 0.05
    collision_penalty_weight: 1.0

algorithm:
  name: SAC
  use_her: false
  kwargs:
    learning_rate: 0.0003
    buffer_size: 1000000
    learning_starts: 1000
    batch_size: 256
    gamma: 0.95
    tau: 0.005
    train_freq: 1
    gradient_steps: 1
    ent_coef: auto

train:
  total_timesteps: 100000
  checkpoint_freq: 25000
  log_interval: 10

eval:
  episodes: 20
  deterministic: true
