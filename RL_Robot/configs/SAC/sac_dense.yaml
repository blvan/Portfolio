experiment_name: sac_dense
seed: 42

env:
  reward: dense
  max_episode_steps: 50
  n_envs: 1
  vec_env: dummy
  metrics:
    grasp_lift_threshold: 0.03
    grasp_distance_threshold: 0.07

algorithm:
  name: SAC
  use_her: false
  kwargs:
    learning_rate: 0.0003
    buffer_size: 1000000
    learning_starts: 1000
    batch_size: 256
    gamma: 0.95
    tau: 0.005
    train_freq: 1
    gradient_steps: 1
    ent_coef: auto

train:
  total_timesteps: 100000
  checkpoint_freq: 25000
  log_interval: 10

eval:
  episodes: 20
  deterministic: true
