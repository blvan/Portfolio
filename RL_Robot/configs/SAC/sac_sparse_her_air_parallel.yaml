experiment_name: sac_sparse_her_air_parallel
seed: 42

env:
  reward: sparse
  max_episode_steps: 50
  n_envs: 4
  vec_env: subproc
  air_goal:
    enabled: true
    min_height_above_table: 0.10
    max_height_above_table: 0.25
  metrics:
    grasp_lift_threshold: 0.03
    grasp_distance_threshold: 0.07
    place_lift_threshold: 0.08

algorithm:
  name: SAC
  use_her: true
  her:
    n_sampled_goal: 4
    goal_selection_strategy: future
  kwargs:
    learning_rate: 0.0003
    buffer_size: 1000000
    learning_starts: 5000
    batch_size: 512
    gamma: 0.95
    tau: 0.005
    train_freq: 1
    gradient_steps: 8
    ent_coef: auto

train:
  total_timesteps: 100000
  checkpoint_freq: 25000
  log_interval: 10

eval:
  episodes: 20
  deterministic: true
