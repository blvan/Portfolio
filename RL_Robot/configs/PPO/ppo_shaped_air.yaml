experiment_name: ppo_shaped_air
seed: 42

env:
  reward: shaped
  max_episode_steps: 50
  n_envs: 8
  vec_env: subproc
  metrics:
    grasp_lift_threshold: 0.03
    grasp_distance_threshold: 0.07
    place_lift_threshold: 0.08
  air_goal:
    enabled: true
    min_height_above_table: 0.1
    max_height_above_table: 0.25
  shaped_reward:
    goal_distance_weight: 1.0
    gripper_distance_weight: 0.25
    lift_weight: 1.5
    success_bonus: 3.0
    action_penalty_weight: 0.01
    collision_penalty_weight: 0.0

algorithm:
  name: PPO
  kwargs:
    learning_rate: 0.0003
    n_steps: 1024
    batch_size: 256
    n_epochs: 10
    gamma: 0.95
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.0

train:
  total_timesteps: 1000000
  checkpoint_freq: 25000
  log_interval: 10

eval:
  episodes: 20
  deterministic: true
