experiment_name: ppo_shaped
seed: 42

env:
  reward: shaped
  max_episode_steps: 50
  n_envs: 4
  vec_env: dummy
  metrics:
    grasp_lift_threshold: 0.03
    grasp_distance_threshold: 0.07
  shaped_reward:
    goal_distance_weight: 1.0
    gripper_distance_weight: 0.2
    lift_weight: 0.8
    success_bonus: 2.0
    action_penalty_weight: 0.01

algorithm:
  name: PPO
  kwargs:
    learning_rate: 0.0003
    n_steps: 1024
    batch_size: 256
    n_epochs: 10
    gamma: 0.95
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.0

train:
  total_timesteps: 100000
  checkpoint_freq: 25000
  log_interval: 10

eval:
  episodes: 20
  deterministic: true
