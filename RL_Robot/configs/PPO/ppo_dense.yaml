experiment_name: ppo_dense
seed: 42

env:
  reward: dense
  max_episode_steps: 50
  n_envs: 4
  vec_env: dummy
  metrics:
    grasp_lift_threshold: 0.03
    grasp_distance_threshold: 0.07

algorithm:
  name: PPO
  kwargs:
    learning_rate: 0.0003
    n_steps: 1024
    batch_size: 256
    n_epochs: 10
    gamma: 0.95
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.0

train:
  total_timesteps: 100000
  checkpoint_freq: 25000
  log_interval: 10

eval:
  episodes: 20
  deterministic: true
